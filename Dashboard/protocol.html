<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ROMRxBJJ — My Protocol</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/dashboard.css">
  <!-- GA4 — #36 Replace G-G6GXJWW0F1 with your real Measurement ID -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-G6GXJWW0F1"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){ dataLayer.push(arguments); }
    gtag('js', new Date());
    gtag('config', 'G-G6GXJWW0F1');
  </script>
  <style>
    /* #44 Video link */
    .rx-video-link {
      display: inline-block; margin-left: 12px; padding: 3px 10px;
      background: #e74c3c; color: #fff; border-radius: 4px; font-size: 0.78rem;
      font-weight: 600; text-decoration: none; vertical-align: middle;
      transition: background 0.2s;
    }
    .rx-video-link:hover { background: #c0392b; text-decoration: none; }

    /* #46 Check-in */
    .rx-checkin-label {
      display: flex; align-items: center; gap: 10px; margin-top: 12px;
      cursor: pointer; user-select: none;
    }
    .rx-checkin-box { width: 18px; height: 18px; accent-color: #28A745; cursor: pointer; flex-shrink: 0; }
    .rx-checkin-text { font-size: 0.85rem; color: #5a6a75; font-family: 'Inter', sans-serif; }
    .rx-checkin-box:checked + .rx-checkin-text { color: #28A745; font-weight: 600; }

    /* #46 Streak badge */
    .streak-badge {
      display: inline-block; margin-top: 8px; padding: 6px 16px;
      background: #fff3cd; border: 1px solid #ffc107; border-radius: 20px;
      font-size: 0.85rem; font-weight: 600; color: #856404;
    }

    /* #45 Print button */
    .print-protocol-btn {
      display: inline-block; margin: 16px 0; padding: 10px 24px;
      background: #36454F; color: #fff; border: none; border-radius: 8px;
      font-family: 'Montserrat', sans-serif; font-weight: 600; font-size: 0.9rem;
      cursor: pointer; transition: background 0.2s;
    }
    .print-protocol-btn:hover { background: #2a363f; }

    /* #45 Print CSS */
    @media print {
      .app-header, .app-nav, .app-footer, .print-protocol-btn,
      .rx-checkin-label, .rx-video-link, #refresh-btn { display: none !important; }
      .rx-card { page-break-inside: avoid; border: 1px solid #ccc; margin-bottom: 12px; }
      .protocol-hero { padding: 12px 0; }
      body { background: #fff; font-size: 12pt; }
    }
  </style>
</head>
<body>
  <header class="app-header">
    <div class="header-inner">
      <a href="game.html" class="header-logo">ROMRxBJJ</a>
      <div class="header-right">
        <span class="header-greeting">Hi, <span id="user-name"></span></span>
        <button id="refresh-btn" class="header-refresh" title="Clear cached data and reload">&#x21BB; Refresh</button>
        <a href="#" id="logout-link" class="header-logout">Log Out</a>
      </div>
    </div>
  </header>

  <nav class="app-nav">
    <div class="nav-inner">
      <a class="nav-pill" href="body.html">🏋️ My Body </a>
      <a class="nav-pill" href="game.html">🎮 My Game</a>
      <a class="nav-pill active" href="protocol.html">📋 My Protocol</a>
    </div>
  </nav>

  <main class="app-main">
    <div style="padding: 12px 20px 0;">
      <button class="print-protocol-btn" onclick="window.print()">&#x1F5A8; Print / Save PDF</button>
    </div>
    <div id="app">
      <div class="protocol-loading">
        <div class="spinner"></div>
        <p>Loading your protocol...</p>
      </div>
    </div>
  </main>

  <footer class="app-footer">
    <div class="footer-tagline">Your body. Your game. Your protocol.</div>
    <div class="footer-copy">&copy; 2026 ROMRx LLC &middot; romrxbjj.com</div>
  </footer>

  <script src="js/analytics.js"></script>
  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/protocol.js"></script>
  <script>
    // #25 Refresh My Data
    (function() {
      var btn = document.getElementById('refresh-btn');
      if (btn) {
        btn.addEventListener('click', function() {
          btn.textContent = 'Refreshing…';
          btn.disabled = true;
          clearCache();
          setTimeout(function() { window.location.reload(); }, 200);
        });
      }
    })();
  </script>
  <script>
    // #36 GA4: track protocol page view
    document.addEventListener('DOMContentLoaded', function() {
      trackEvent('protocol_view');
    });
  </script>
</body>
</html>
