[build]
  command   = "npm run build"
  publish   = "dist"

# Serve marketing page at / via Netlify rewrite (before the SPA catch-all)
[[redirects]]
  from   = "/"
  to     = "/marketing.html"
  status = 200
  force  = true

# Legal page
[[redirects]]
  from   = "/legal"
  to     = "/legal.html"
  status = 200
  force  = true

# Marketing sub-pages
[[redirects]]
  from   = "/athletes"
  to     = "/athletes.html"
  status = 200
  force  = true

[[redirects]]
  from   = "/coaches"
  to     = "/coaches.html"
  status = 200
  force  = true

[[redirects]]
  from   = "/gyms"
  to     = "/gyms.html"
  status = 200
  force  = true

[[redirects]]
  from   = "/schools"
  to     = "/schools.html"
  status = 200
  force  = true

# SEO articles
[[redirects]]
  from   = "/hip-mobility-for-bjj"
  to     = "/hip-mobility-for-bjj.html"
  status = 200
  force  = true

[[redirects]]
  from   = "/why-are-my-hips-so-tight-from-bjj"
  to     = "/why-are-my-hips-so-tight-from-bjj.html"
  status = 200
