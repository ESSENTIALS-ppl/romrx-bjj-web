<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="ROMRxBJJ™ Coach Dashboard — View your athlete roster, ROM readiness scores, RAMP warmup protocols, and asymmetry alerts across your full team.">
    <meta property="og:title" content="ROMRxBJJ™ | Coach Dashboard">
    <meta property="og:description" content="Run smarter classes. Know every athlete’s mobility before they step on the mat.">
    <meta property="og:url" content="https://romrxbjj.com/coach">
    <meta property="og:type" content="website">
    <meta property="og:image" content="https://romrxbjj.com/og-image.jpg">
    <meta name="twitter:card" content="summary_large_image">
    <link rel="canonical" href="https://romrxbjj.com/coach">
    <title>ROMRxBJJ Coach Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <link rel="stylesheet" href="coach.css">
</head>
<body>

  <!-- ===== LOGIN VIEW ===== -->
  <div id="login-view">
    <div class="login-page">
      <div class="login-brand">
        <h1 class="brand-logo">ROMRxBJJ</h1>
        <p class="brand-tagline">Your body. Your game. Your protocol.</p>
        <p class="brand-subtitle">Coach Dashboard</p>
      </div>
      <div class="login-card">
        <form id="login-form" autocomplete="off">
          <label for="coach-email">Email</label>
          <input type="email" id="coach-email" name="email" placeholder="Enter your coach email" required>
          <label for="coach-code">Access Code</label>
          <input type="text" id="coach-code" name="code" maxlength="6" placeholder="6-character code" required>
          <div id="login-error" class="error-msg" hidden></div>
          <button type="submit" id="login-btn" class="btn-coach-primary">Enter Coach Dashboard</button>
        </form>
        <p class="help-text">Your access code was provided by the ROMRxBJJ admin.</p>
      </div>
    </div>
  </div>

  <!-- ===== DASHBOARD VIEW (hidden until login) ===== -->
  <div id="dashboard-view" style="display:none;">

    <header class="coach-header">
      <h1>ROMRxBJJ <span style="font-weight:400;opacity:0.85;">Coach</span></h1>
      <div style="display:flex;align-items:center;gap:16px;">
        <span class="coach-user" id="coach-name"></span>
        <a href="#" class="logout-link" id="coach-logout">Log Out</a>
      </div>
    </header>

    <nav class="coach-nav">
      <button class="nav-pill active" data-tab="roster">Athlete Roster</button>
      <button class="nav-pill" data-tab="warmup">Class Warmup</button>
      <button class="nav-pill" data-tab="trends">Trends</button>
      <button class="nav-pill" data-tab="alerts">Alerts <span id="alert-badge" class="alert-count-badge" style="display:none;">0</span></button>
    </nav>

    <!-- Tab: Athlete Roster -->
    <div class="tab-content active" id="tab-roster">
      <div id="roster-loading" class="loading-spinner">Loading athlete roster...</div>
      <div id="roster-overview" class="class-overview" style="display:none;">
        <div class="overview-stat">
          <div class="stat-value" id="stat-total">&mdash;</div>
          <div class="stat-label">Total Athletes</div>
        </div>
        <div class="overview-stat">
          <div class="stat-value" id="stat-avg-flags">&mdash;</div>
          <div class="stat-label">Avg Flagged Joints</div>
        </div>
        <div class="overview-stat">
          <div class="stat-value" id="stat-common">&mdash;</div>
          <div class="stat-label">Most Common Issue</div>
        </div>
      </div>
      <div id="athlete-grid" class="athlete-grid"></div>
    </div>

    <!-- Tab: Class Warmup -->
    <div class="tab-content" id="tab-warmup">
      <div id="warmup-content"></div>
    </div>

    <!-- Tab: Trends -->
    <div class="tab-content" id="tab-trends">
      <div id="trends-content"><div class="loading-spinner">Loading trends...</div></div>
    </div>

    <!-- Tab: Alerts -->
    <div class="tab-content" id="tab-alerts">
      <div id="alerts-content"><div class="loading-spinner">Loading alerts...</div></div>
    </div>

    <footer style="text-align:center;padding:20px;font-size:12px;color:#aaa;border-top:1px solid #E0E0E0;margin-top:40px;">
      &copy; 2026 ROMRx LLC &middot; romrxbjj.com
    </footer>
  </div>

  <script src="../Dashboard/js/config.js"></script>
  <script src="coach-auth.js"></script>
  <script src="coach.js"></script>
  <script>
    // ===== LOGIN LOGIC =====
    (function() {
      var session = getCoachSession();
      if (session) { showDashboard(session); return; }

      document.getElementById('login-form').addEventListener('submit', async function(e) {
        e.preventDefault();
        var errDiv = document.getElementById('login-error');
        errDiv.hidden = true;
        var email = document.getElementById('coach-email').value.trim().toLowerCase();
        var code = document.getElementById('coach-code').value.trim().toUpperCase();
        var btn = document.getElementById('login-btn');
        if (!email || !code) { errDiv.textContent = 'Please enter both email and access code.'; errDiv.hidden = false; return; }
        btn.disabled = true;
        btn.textContent = 'Verifying...';
        try {
          var res = await apiCoachLogin(email, code);
          if (res.success) {
            var sess = { email: res.email || email, name: res.name || 'Coach', loginTime: Date.now() };
            sessionStorage.setItem('romrxbjj_coach', JSON.stringify(sess));
            showDashboard(sess);
          } else { errDiv.textContent = res.error || 'Login failed. Check your credentials.'; errDiv.hidden = false; }
        } catch(ex) { errDiv.textContent = 'Network error. Please try again.'; errDiv.hidden = false; }
        btn.disabled = false;
        btn.textContent = 'Enter Coach Dashboard';
      });
    })();

    // ===== DASHBOARD INIT =====
    var _rosterData = null;
    var _trendsLoaded = false;
    var _alertsLoaded = false;
    var _dismissedAlerts = {};
    var _currentPage = 1;        // #33 pagination
    var _currentCoachEmail = ''; // #33 pagination
    var _hasMore = false;        // #33 pagination

    function showDashboard(session) {
      document.getElementById('login-view').style.display = 'none';
      document.getElementById('dashboard-view').style.display = 'block';
      document.getElementById('coach-name').textContent = session.name.split(' ')[0];
      document.getElementById('coach-logout').addEventListener('click', function(e) { e.preventDefault(); coachLogout(); });

      var pills = document.querySelectorAll('.coach-nav .nav-pill');
      pills.forEach(function(pill) {
        pill.addEventListener('click', function() {
          var tab = this.getAttribute('data-tab');
          pills.forEach(function(p) { p.classList.remove('active'); });
          this.classList.add('active');
          document.querySelectorAll('.tab-content').forEach(function(tc) { tc.classList.remove('active'); });
          document.getElementById('tab-' + tab).classList.add('active');
          if (tab === 'warmup') loadWarmupTab();
          if (tab === 'trends' && !_trendsLoaded) { _trendsLoaded = true; renderTrendsTab(); }
          if (tab === 'alerts' && !_alertsLoaded) { _alertsLoaded = true; renderAlertsTab(); }
        });
      });
      loadRoster(session.email);
    }

    // ===== ROSTER TAB =====
    async function loadRoster(coachEmail, page) {
      page = page || 1;
      _currentCoachEmail = coachEmail;
      _currentPage = page;
      if (page === 1) document.getElementById('roster-loading').style.display = 'block';
      try {
        var data = await apiGetRoster(coachEmail, page, 50);
        _rosterData = data;
        _hasMore = data.hasMore || false;
        document.getElementById('roster-loading').style.display = 'none';
        if (!data.success && data.success !== undefined) {
          document.getElementById('athlete-grid').innerHTML = '<p style="text-align:center;color:#6B7B8D;padding:40px;">Unable to load roster. ' + (data.error || '') + '</p>';
          return;
        }
        var athletes = data.athletes || [];
        if (page === 1 && athletes.length === 0) {
          document.getElementById('athlete-grid').innerHTML = '<p style="text-align:center;color:#6B7B8D;padding:40px;">No athletes found.</p>';
          return;
        }
        document.getElementById('roster-overview').style.display = 'flex';
        document.getElementById('stat-total').textContent = data.total || athletes.length;
        var totalFlags = 0, jointCounts = {};
        athletes.forEach(function(a) {
          totalFlags += (a.priorityJoints || []).length;
          (a.priorityJoints || []).forEach(function(j) {
            var name = j.joint || j.name || 'Unknown';
            jointCounts[name] = (jointCounts[name] || 0) + 1;
          });
        });
        document.getElementById('stat-avg-flags').textContent = athletes.length > 0 ? (totalFlags / athletes.length).toFixed(1) : '0';
        var commonJoint = '\u2014', maxCount = 0;
        for (var jn in jointCounts) { if (jointCounts[jn] > maxCount) { maxCount = jointCounts[jn]; commonJoint = jn; } }
        document.getElementById('stat-common').textContent = commonJoint;

        // Update alert badge
        var atRiskCount = 0;
        athletes.forEach(function(a) {
          (a.priorityJoints || []).forEach(function(j) {
            if ((j.asymmetry || 0) > 25 || j.status === 'At-Risk' || j.status === 'RED') atRiskCount++;
          });
        });
        if (atRiskCount > 0) {
          var badge = document.getElementById('alert-badge');
          badge.textContent = atRiskCount;
          badge.style.display = 'inline-block';
        }

        var grid = document.getElementById('athlete-grid');
        // #33: append on pages > 1, replace on first page
        if (page === 1) {
          grid.innerHTML = '';
          var lmc = document.getElementById('load-more-container');
          if (lmc) lmc.innerHTML = '';
        }
        athletes.forEach(function(a) { grid.innerHTML += renderAthleteCard(a); });
        grid.querySelectorAll('.athlete-card').forEach(function(card) {
          card.addEventListener('click', function(e) {
            if (e.target.closest('.protocol-toggle')) return;
            this.classList.toggle('expanded');
          });
        });
        grid.querySelectorAll('.protocol-toggle').forEach(function(btn) {
          btn.addEventListener('click', function(e) {
            e.stopPropagation();
            var panel = this.closest('.athlete-card').querySelector('.protocol-panel');
            var isOpen = panel.style.display !== 'none';
            panel.style.display = isOpen ? 'none' : 'block';
            this.textContent = isOpen ? '+ View Protocol' : '\u2212 Hide Protocol';
          });
        });
        // #33 Load More button
        var lmContainer = document.getElementById('load-more-container');
        if (lmContainer) {
          lmContainer.innerHTML = '';
          if (_hasMore) {
            var lmBtn = document.createElement('button');
            lmBtn.className = 'load-more-btn';
            lmBtn.textContent = 'Load More Athletes';
            lmBtn.addEventListener('click', function() {
              lmBtn.disabled = true;
              lmBtn.textContent = 'Loading\u2026';
              loadRoster(_currentCoachEmail, _currentPage + 1);
            });
            lmContainer.appendChild(lmBtn);
          }
        }
      } catch(err) {
        document.getElementById('roster-loading').style.display = 'none';
        document.getElementById('athlete-grid').innerHTML = '<p style="text-align:center;color:#E74C3C;padding:40px;">Error loading roster.</p>';
      }
    }

    function renderAthleteCard(a) {
      var name = a.name || a.fullName || 'Athlete';
      var belt = (a.belt || 'white').toLowerCase();
      var beltClass = belt === 'blue' ? 'belt-blue' : 'belt-white';
      var beltLabel = belt.charAt(0).toUpperCase() + belt.slice(1) + ' Belt';
      var g = a.greenCount || a.green || 0, y = a.yellowCount || a.yellow || 0, r = a.redCount || a.red || 0;
      var total = g + y + r || 1;
      var gPct = Math.round((g / total) * 100), yPct = Math.round((y / total) * 100), rPct = 100 - gPct - yPct;
      var joints = a.priorityJoints || [], jointBadges = '';
      joints.forEach(function(j) {
        var jName = j.joint || j.name || '';
        var asym = j.asymmetry ? ' ' + j.asymmetry.toFixed(1) + '%' : '';
        var cls = (j.status === 'At-Risk' || j.status === 'RED') ? 'red-joint' : 'yellow-joint';
        jointBadges += '<span class="roster-joint-badge ' + cls + '">' + jName + asym + '</span>';
      });

      // ===== #13 PROTOCOL EXERCISES =====
      var protocolRows = '';
      var protocols = a.protocols || a.exercises || [];
      if (protocols.length > 0) {
        protocols.forEach(function(ex) {
          var exName = ex.exercise || ex.name || 'Exercise';
          var exJoint = ex.joint || '';
          var exSets = ex.sets || '';
          var exReps = ex.reps || '';
          var exNotes = ex.notes || ex.cue || '';
          protocolRows += '<div class="protocol-row">';
          protocolRows += '<div class="protocol-ex-name">' + exName + '</div>';
          protocolRows += '<div class="protocol-ex-meta">';
          if (exJoint) protocolRows += '<span class="protocol-joint-tag">' + exJoint + '</span>';
          if (exSets && exReps) protocolRows += '<span class="protocol-sets">' + exSets + 'x' + exReps + '</span>';
          if (exNotes) protocolRows += '<span class="protocol-cue">' + exNotes + '</span>';
          protocolRows += '</div></div>';
        });
      } else if (joints.length > 0) {
        // Fallback: generate generic protocol from priority joints
        joints.forEach(function(j) {
          var jName = j.joint || j.name || 'Joint';
          var isRed = (j.status === 'At-Risk' || j.status === 'RED');
          protocolRows += '<div class="protocol-row">';
          protocolRows += '<div class="protocol-ex-name">' + jName + ' Mobility Drill</div>';
          protocolRows += '<div class="protocol-ex-meta">';
          protocolRows += '<span class="protocol-joint-tag">' + jName + '</span>';
          protocolRows += '<span class="protocol-sets">3x10</span>';
          if (isRed) protocolRows += '<span class="protocol-cue">At-Risk — controlled range only</span>';
          protocolRows += '</div></div>';
        });
      } else {
        protocolRows = '<p class="protocol-empty">No protocol assigned yet.</p>';
      }

      var html = '<div class="athlete-card">';
      html += '<div class="athlete-name">' + name + '</div>';
      html += '<div class="athlete-meta"><span class="belt-badge ' + beltClass + '">' + beltLabel + '</span></div>';
      html += '<div class="tier-bar-container"><div class="tier-bar-label">Technique Readiness</div><div class="tier-bar">';
      if (gPct > 0) html += '<div class="tier-segment tier-green" style="width:' + gPct + '%">' + g + '</div>';
      if (yPct > 0) html += '<div class="tier-segment tier-yellow" style="width:' + yPct + '%">' + y + '</div>';
      if (rPct > 0) html += '<div class="tier-segment tier-red" style="width:' + rPct + '%">' + r + '</div>';
      html += '</div></div>';
      if (jointBadges) html += '<div class="priority-joints">' + jointBadges + '</div>';
      html += '<div class="athlete-detail">';
      html += '<button class="protocol-toggle">+ View Protocol</button>';
      html += '<div class="protocol-panel" style="display:none;">' + protocolRows + '</div>';
      html += '</div>';
      html += '</div>';
      return html;
    }

    // ===== #11 TRENDS TAB =====
    function renderTrendsTab() {
      var container = document.getElementById('trends-content');
      if (!_rosterData || !(_rosterData.athletes || []).length) {
        container.innerHTML = '<div class="trends-empty"><div style="font-size:48px;">&#x1F4CA;</div><h2>No roster data yet</h2><p>Trends will appear once athletes complete assessments.</p></div>';
        return;
      }
      var athletes = _rosterData.athletes || [];

      // Aggregate joint data across all athletes
      var jointMap = {};
      athletes.forEach(function(a) {
        (a.priorityJoints || []).forEach(function(j) {
          var jName = j.joint || j.name || 'Unknown';
          if (!jointMap[jName]) jointMap[jName] = { total: 0, count: 0, atRisk: 0 };
          jointMap[jName].total += (j.asymmetry || 0);
          jointMap[jName].count++;
          if (j.status === 'At-Risk' || j.status === 'RED' || (j.asymmetry || 0) > 25) jointMap[jName].atRisk++;
        });
      });

      var jointNames = Object.keys(jointMap);
      var avgAsyms = jointNames.map(function(jn) { return jointMap[jn].count > 0 ? +(jointMap[jn].total / jointMap[jn].count).toFixed(1) : 0; });
      var atRiskCounts = jointNames.map(function(jn) { return jointMap[jn].atRisk; });

      // Athlete readiness scores
      var sortedAthletes = athletes.slice().sort(function(a, b) {
        var aScore = (a.greenCount || 0) / Math.max(1, (a.greenCount || 0) + (a.yellowCount || 0) + (a.redCount || 0));
        var bScore = (b.greenCount || 0) / Math.max(1, (b.greenCount || 0) + (b.yellowCount || 0) + (b.redCount || 0));
        return bScore - aScore;
      });

      var totalG = 0, totalY = 0, totalR = 0;
      athletes.forEach(function(a) { totalG += (a.greenCount || 0); totalY += (a.yellowCount || 0); totalR += (a.redCount || 0); });
      var grandTotal = totalG + totalY + totalR || 1;

      container.innerHTML =
        '<div class="trends-wrap">' +
        '<div class="trends-section">' +
        '<h2 class="trends-heading">Class Readiness Breakdown</h2>' +
        '<div class="trends-donut-row">' +
        '<div class="trends-chart-box"><canvas id="chart-readiness" width="220" height="220"></canvas></div>' +
        '<div class="trends-legend">' +
        '<div class="legend-item"><span class="legend-dot" style="background:#28A745;"></span><span class="legend-label">Ready</span><span class="legend-val">' + totalG + ' joints (' + Math.round(totalG/grandTotal*100) + '%)</span></div>' +
        '<div class="legend-item"><span class="legend-dot" style="background:#FFB347;"></span><span class="legend-label">Monitor</span><span class="legend-val">' + totalY + ' joints (' + Math.round(totalY/grandTotal*100) + '%)</span></div>' +
        '<div class="legend-item"><span class="legend-dot" style="background:#E74C3C;"></span><span class="legend-label">At-Risk</span><span class="legend-val">' + totalR + ' joints (' + Math.round(totalR/grandTotal*100) + '%)</span></div>' +
        '</div></div></div>' +
        (jointNames.length > 0 ?
        '<div class="trends-section">' +
        '<h2 class="trends-heading">Avg Asymmetry by Joint</h2>' +
        '<div class="trends-chart-box trends-chart-wide"><canvas id="chart-joints" height="160"></canvas></div>' +
        '</div>' : '') +
        '<div class="trends-section">' +
        '<h2 class="trends-heading">Athlete Readiness Ranking</h2>' +
        '<div class="trends-ranking">' +
        sortedAthletes.map(function(a, i) {
          var g = a.greenCount || 0, y = a.yellowCount || 0, r = a.redCount || 0;
          var tot = g + y + r || 1;
          var pct = Math.round((g / tot) * 100);
          var medal = i === 0 ? '&#x1F947;' : i === 1 ? '&#x1F948;' : i === 2 ? '&#x1F949;' : '';
          return '<div class="rank-row">' +
            '<span class="rank-num">' + (medal || (i+1)) + '</span>' +
            '<span class="rank-name">' + (a.name || 'Athlete') + '</span>' +
            '<div class="rank-bar-wrap"><div class="rank-bar" style="width:' + pct + '%;background:' + (pct > 70 ? '#28A745' : pct > 40 ? '#FFB347' : '#E74C3C') + ';"></div></div>' +
            '<span class="rank-pct">' + pct + '%</span>' +
            '</div>';
        }).join('') +
        '</div></div>' +
        '</div>';

      // Render donut chart
      new Chart(document.getElementById('chart-readiness'), {
        type: 'doughnut',
        data: {
          labels: ['Ready', 'Monitor', 'At-Risk'],
          datasets: [{ data: [totalG, totalY, totalR], backgroundColor: ['#28A745','#FFB347','#E74C3C'], borderWidth: 2, borderColor: '#fff' }]
        },
        options: { cutout: '65%', plugins: { legend: { display: false } }, animation: { animateRotate: true } }
      });

      // Render bar chart if joint data exists
      if (jointNames.length > 0) {
        new Chart(document.getElementById('chart-joints'), {
          type: 'bar',
          data: {
            labels: jointNames,
            datasets: [{
              label: 'Avg Asymmetry %',
              data: avgAsyms,
              backgroundColor: avgAsyms.map(function(v) { return v > 25 ? '#E74C3C' : v > 15 ? '#FFB347' : '#28A745'; }),
              borderRadius: 4
            }]
          },
          options: {
            indexAxis: 'y',
            plugins: { legend: { display: false } },
            scales: {
              x: { beginAtZero: true, max: 50, ticks: { callback: function(v) { return v + '%'; } } },
              y: { ticks: { font: { size: 12 } } }
            }
          }
        });
      }
    }

    // ===== #12 ALERTS TAB =====
    function renderAlertsTab() {
      var container = document.getElementById('alerts-content');
      if (!_rosterData || !(_rosterData.athletes || []).length) {
        container.innerHTML = '<div class="alerts-empty"><div style="font-size:48px;">&#x1F514;</div><h2>No alerts</h2><p>All athletes are within normal thresholds.</p></div>';
        return;
      }
      var athletes = _rosterData.athletes || [];
      var alerts = [];

      athletes.forEach(function(a) {
        var name = a.name || a.fullName || 'Athlete';
        (a.priorityJoints || []).forEach(function(j) {
          var jName = j.joint || j.name || 'Unknown';
          var asym = j.asymmetry || 0;
          var isRed = (j.status === 'At-Risk' || j.status === 'RED' || asym > 25);
          var isYellow = !isRed && (j.status === 'Monitor' || j.status === 'YELLOW' || asym > 15);
          if (isRed || isYellow) {
            alerts.push({ athlete: name, joint: jName, asym: asym, level: isRed ? 'critical' : 'monitor', belt: a.belt || 'white' });
          }
        });
      });

      alerts.sort(function(a, b) { return b.asym - a.asym; });

      if (alerts.length === 0) {
        container.innerHTML = '<div class="alerts-empty"><div style="font-size:48px;">&#x2705;</div><h2>All Clear</h2><p>No athletes are currently flagged above threshold.</p></div>';
        return;
      }

      var critCount = alerts.filter(function(a) { return a.level === 'critical'; }).length;
      var monCount = alerts.filter(function(a) { return a.level === 'monitor'; }).length;

      var html = '<div class="alerts-wrap">';
      html += '<div class="alerts-summary">';
      html += '<div class="alert-sum-box critical-box"><div class="alert-sum-num">' + critCount + '</div><div class="alert-sum-label">Critical (>25% asym)</div></div>';
      html += '<div class="alert-sum-box monitor-box"><div class="alert-sum-num">' + monCount + '</div><div class="alert-sum-label">Monitor (>15% asym)</div></div>';
      html += '</div>';
      html += '<div class="alerts-list">';

      alerts.forEach(function(al, idx) {
        var key = al.athlete + '_' + al.joint;
        if (_dismissedAlerts[key]) return;
        var levelClass = al.level === 'critical' ? 'alert-critical' : 'alert-monitor';
        var levelLabel = al.level === 'critical' ? '&#x26A0; At-Risk' : '&#x1F7E1; Monitor';
        html += '<div class="alert-row ' + levelClass + '" id="alert-' + idx + '">';
        html += '<div class="alert-row-main">';
        html += '<span class="alert-level-badge">' + levelLabel + '</span>';
        html += '<span class="alert-athlete">' + al.athlete + '</span>';
        html += '<span class="alert-joint">' + al.joint + '</span>';
        html += '<span class="alert-asym">' + al.asym.toFixed(1) + '% asymmetry</span>';
        html += '</div>';
        html += '<button class="alert-dismiss-btn" onclick="dismissAlert(\'' + key + '\', \'alert-' + idx + '\')" title="Acknowledge">&#x2713; Acknowledge</button>';
        html += '</div>';
      });

      html += '</div></div>';
      container.innerHTML = html;
    }

    function dismissAlert(key, rowId) {
      _dismissedAlerts[key] = true;
      var el = document.getElementById(rowId);
      if (el) {
        el.style.opacity = '0';
        el.style.transition = 'opacity 0.3s';
        setTimeout(function() { el.style.display = 'none'; }, 300);
      }
    }
